server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: ras_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: ras
          __path__: /var/log/ras/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp:
            level:
            logger:
            message:
            trace_id:
            span_id:
      - labels:
          level:
          logger:
          trace_id:
      - timestamp:
          format: RFC3339
          source: timestamp
      - output:
          source: message

  - job_name: system_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: system
          __path__: /var/log/host/*.log