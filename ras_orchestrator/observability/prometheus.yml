global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # RAS API Gateway
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api_gateway:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # RAS Salience Engine
  - job_name: 'salience-engine'
    static_configs:
      - targets: ['salience_engine:9464']

  # RAS Mode Manager
  - job_name: 'mode-manager'
    static_configs:
      - targets: ['mode_manager:9464']

  # RAS Interrupt Manager
  - job_name: 'interrupt-manager'
    static_configs:
      - targets: ['interrupt_manager:9464']

  # RAS Task Orchestrator
  - job_name: 'task-orchestrator'
    static_configs:
      - targets: ['task_orchestrator:9464']

  # RAS Retriever Agent
  - job_name: 'retriever-agent'
    static_configs:
      - targets: ['retriever_agent:9464']

  # Node Exporter (optional)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # Kafka Exporter
  - job_name: 'kafka-exporter'
    static_configs:
      - targets: ['kafka-exporter:9308']

  # Redis Exporter
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Postgres Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']