groups:
  - name: ras_critical_alerts
    rules:
      # Service down
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
          component: "{{ $labels.job }}"
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 1 minute."

      # High error rate
      - alert: HighErrorRate
        expr: rate(service_error_rate_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is above 5% for the last 5 minutes."

      # High latency
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(policy_evaluation_latency_bucket[5m])) > 1000
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected (P95 > 1s)"
          description: "95th percentile latency is above 1 second for policy evaluations."

      # Kafka consumer lag
      - alert: KafkaConsumerLag
        expr: kafka_consumer_lag > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High Kafka consumer lag"
          description: "Kafka consumer lag is above 1000 messages for more than 5 minutes."

      # Redis memory usage
      - alert: RedisMemoryHigh
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high"
          description: "Redis memory usage is above 80%."

  - name: ras_business_alerts
    rules:
      # Sudden drop in event throughput
      - alert: EventThroughputDrop
        expr: rate(ras_events_total[5m]) < 0.5 * rate(ras_events_total[10m] offset 5m)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Event throughput dropped significantly"
          description: "Event throughput dropped by more than 50% compared to 5 minutes ago."

      # High interrupt rate anomaly
      - alert: HighInterruptRate
        expr: rate(interrupt_rate_total[10m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High interrupt rate"
          description: "Interrupt rate is above 10 per minute."

      # Mode stuck in critical
      - alert: ModeStuckCritical
        expr: max_over_time(current_mode{value="critical"}[10m]) == 1
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "System stuck in critical mode"
          description: "System has been in critical mode for more than 10 minutes."

      # Policy evaluation failures
      - alert: PolicyEvaluationFailures
        expr: increase(policy_evaluation_failures_total[5m]) > 5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Policy evaluation failures"
          description: "More than 5 policy evaluation failures in the last 5 minutes."